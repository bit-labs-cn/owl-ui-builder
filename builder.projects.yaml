# 每个项目必须为对象：
#   title    平台标题
#   baseUrl  后端根地址，注入为当前进程的 VITE_BASE_URL
#            - 字符串：dev / build 两个模式共用同一个值
#            - 对象 { dev, build }：按命令分别取值（推荐用于 dev 走绝对地址、build 走相对路径 / 的场景）
# 项目名对应 src/<项目名>.ts

asset:
  title: 高速公路通信网络设备管理系统
  baseUrl:
    dev: http://localhost:8080/
    build: /


